<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析技术 | 实操练习题</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        dark: '#0F172A',
                        light: '#F8FAFC',
                        card: '#1E293B'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-light min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <a href="index.html" class="text-primary text-lg"><i class="fa-solid fa-arrow-left"></i> 返回主页</a>
            <h1 class="text-2xl font-bold">数据分析技术 | 10道实操题</h1>
        </div>

        <div class="bg-card p-4 rounded-lg mb-6">
            <p class="text-gray-300">本模块包含 <strong>NumPy / Pandas / Matplotlib</strong> 实操练习，可在线编写代码并运行</p>
        </div>

        <!-- 10道实操题 -->
        <div class="space-y-6">
            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">1. 创建一个包含1-10的NumPy数组</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>

            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">2. 查看数组的形状、数据类型、维度</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>

            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">3. Pandas创建DataFrame（姓名、成绩、班级）</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>

            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">4. 查看DataFrame的前3行数据</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>

            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">5. 计算成绩列的平均值、最大值、最小值</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>

            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">6. 筛选出成绩大于80的学生</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>

            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">7. 按班级分组并统计每组人数</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>

            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">8. 使用Matplotlib绘制成绩柱状图</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>

            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">9. 数据缺失值处理（填充0）</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>

            <div class="bg-card rounded-xl p-5">
                <h3 class="font-bold text-lg mb-2">10. 导出DataFrame为csv格式文件</h3>
                <textarea class="w-full h-24 bg-dark border border-gray-700 rounded p-3 text-light" placeholder="编写代码..."></textarea>
                <button class="run-btn mt-2 px-4 py-2 bg-primary rounded text-white">运行代码</button>
                <div class="output mt-3 p-3 bg-dark rounded border border-gray-700 text-green-400"></div>
            </div>
        </div>
    </div>

    <script>
        let pyodide;
        async function loadPyodide() {
            pyodide = await window.loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.23.4/full/" });
            await pyodide.loadPackage(["numpy", "pandas", "matplotlib"]);
        }
        loadPyodide();

        document.querySelectorAll('.run-btn').forEach((btn, idx) => {
            btn.addEventListener('click', async () => {
                const code = btn.parentElement.querySelector('textarea').value;
                const output = btn.parentElement.querySelector('.output');
                if (!pyodide) { output.textContent = "环境加载中..."; return; }
                try {
                    let result = await pyodide.runPythonAsync(code);
                    output.textContent = result !== undefined ? result : "运行成功！";
                } catch (e) {
                    output.textContent = "错误：" + e.message;
                    output.style.color = "#ef4444";
                }
            });
        });
    </script>
</body>
</html>
